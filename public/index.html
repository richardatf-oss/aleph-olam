<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Aleph Olam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #172a3a, #05070a);
      color: #f4efe2;
      font-family: system-ui, sans-serif;
    }

    main {
      max-width: 760px;
      padding: 3rem;
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }

    .hebrew {
      font-size: 3rem;
      direction: rtl;
      margin: 1rem 0;
      color: #d8c690;
    }

    p {
      line-height: 1.6;
      color: #d6d0c4;
    }

    code {
      color: #90e0ef;
    }
  </style>
</head>
<body>
  <main>
    <h1>Aleph Olam</h1>
   <div class="hebrew">אלף עולם</div>
    <p>
      A symbolic quantum simulator architecture inspired by Hebrew letters,
      Sephirot nodes, transformation paths, niqqud modifiers, and protected
      hidden-register semantics.
    </p>
    <p>
      Python simulator source lives in this repository. The public web gate is open.
    </p>
  </main>
</body>
</html>
